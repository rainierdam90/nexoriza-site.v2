  <rect x="40" y="28" width="120" height="24" rx="4" fill="#5a4f3a" opacity="0.4"/>
  <rect x="920" y="32" width="60" height="16" rx="2" fill="#5a4f3a" opacity="0.3"/>
  <rect x="1000" y="32" width="60" height="16" rx="2" fill="#5a4f3a" opacity="0.3"/>
  <rect x="1080" y="32" width="60" height="16" rx="2" fill="#5a4f3a" opacity="0.3"/>
  <!-- Hero block -->
  <rect x="80" y="160" width="660" height="60" rx="6" fill="#5a4f3a" opacity="0.6"/>
  <rect x="80" y="240" width="540" height="20" rx="4" fill="#5a4f3a" opacity="0.3"/>
