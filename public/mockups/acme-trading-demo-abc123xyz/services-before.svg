  <rect x="440" y="500" width="320" height="200" rx="12" fill="#5a4f3a" opacity="0.1"/>
  <rect x="800" y="500" width="320" height="200" rx="12" fill="#5a4f3a" opacity="0.1"/>
  <!-- Footer -->
