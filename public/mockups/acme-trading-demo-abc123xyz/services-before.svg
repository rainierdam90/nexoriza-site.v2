  <!-- Big diagonal label so it's clear this is a placeholder -->
  <text x="600.0" y="460.0" text-anchor="middle" font-family="sans-serif" font-size="64" font-weight="700" fill="#5a4f3a" opacity="0.18">BEFORE</text>
  <text x="600.0" y="520.0" text-anchor="middle" font-family="sans-serif" font-size="22" fill="#5a4f3a" opacity="0.5">Services — current design</text>
